<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Gallery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2a6c, #2b5876, #4e4376);
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
        }
        
        .title {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }
        
        .subtitle {
            font-size: 1.2rem;
            opacity: 0.8;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .search-box {
            display: flex;
            justify-content: center;
            margin: 30px 0;
        }
        
        .search-input {
            width: 100%;
            max-width: 500px;
            padding: 15px 25px;
            border: none;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 1rem;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }
        
        .search-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
        
        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        
        .grid-view {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
        }
        
        .card-image {
            width: 100%;
            height: 220px;
            overflow: hidden;
            position: relative;
        }
        
        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        
        .card:hover .card-image img {
            transform: scale(1.1);
        }
        
        .card-content {
            padding: 20px;
        }
        
        .card-label {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #fff;
        }
        
        .card-actions {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .btn {
            padding: 8px 15px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .btn-view {
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            color: white;
        }
        
        .btn-download {
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
        }
        
        .view-options {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            gap: 10px;
        }
        
        .view-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .view-btn.active {
            background: linear-gradient(to right, #ff7e5f, #feb47b);
        }
        
        .footer {
            text-align: center;
            margin-top: 60px;
            padding: 20px;
            opacity: 0.7;
            font-size: 0.9rem;
        }
        
        @media (max-width: 768px) {
            .title {
                font-size: 2.5rem;
            }
            
            .grid-view {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 20px;
            }
        }
        
        @media (max-width: 480px) {
            .title {
                font-size: 2rem;
            }
            
            .grid-view {
                grid-template-columns: 1fr;
            }
            
            .search-input {
                padding: 12px 20px;
            }
        }
        
        /* Animation for cards */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .card {
            animation: fadeIn 0.5s ease-out;
        }
        
        /* Hover effect for card images */
        .card-image::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent 0%, rgba(0, 0, 0, 0.5) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .card:hover .card-image::after {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 class="title">IMAGE DATABASE</h1>
            <p class="subtitle">Browse through our curated collection of labeled images</p>
        </header>
        
        <div class="search-box">
            <input type="text" class="search-input" placeholder="Search images by label...">
        </div>
        
        <div class="view-options">
            <button class="view-btn active"><i class="fas fa-th"></i> Grid View</button>
            <button class="view-btn"><i class="fas fa-list"></i> List View</button>
        </div>
        
        <div class="grid-view">
            <!-- Your Django content will go here -->
            {% for model in models %}
            <div class="card">
                <div class="card-image">
                    <img src="{{ model.image.url }}" alt="Image">
                </div>
                <div class="card-content">
                    <h3 class="card-label">{{model.label}}</h3>
                    
                    
                </div>
            </div>
            {% endfor %}
        </div>
        
        <div class="footer">
            <p>© 2023 Image Database | Designed with <i class="fas fa-heart" style="color: #ff7e5f;"></i></p>
        </div>
    </div>

    <script>
        // Simple search functionality
        const searchInput = document.querySelector('.search-input');
        const cards = document.querySelectorAll('.card');
        
        searchInput.addEventListener('input', () => {
            const searchTerm = searchInput.value.toLowerCase();
            
            cards.forEach(card => {
                const label = card.querySelector('.card-label').textContent.toLowerCase();
                if (label.includes(searchTerm)) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        });
        
        // View toggle functionality
        const viewButtons = document.querySelectorAll('.view-btn');
        const gridView = document.querySelector('.grid-view');
        
        viewButtons.forEach(button => {
            button.addEventListener('click', () => {
                viewButtons.forEach(btn => btn.classList.remove('active'));
                button.classList.add('active');
                
                if (button.textContent.includes('List')) {
                    gridView.style.gridTemplateColumns = '1fr';
                    document.querySelectorAll('.card').forEach(card => {
                        card.style.display = 'flex';
                        card.style.flexDirection = 'row';
                        card.style.maxWidth = '100%';
                    });
                } else {
                    gridView.style.gridTemplateColumns = 'repeat(auto-fill, minmax(300px, 1fr))';
                    document.querySelectorAll('.card').forEach(card => {
                        card.style.display = 'block';
                        card.style.flexDirection = 'column';
                    });
                }
            });
        });
    </script>
</body>
</html>
